; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32-c3-supermini

[extra]
baud = 115200

[env]
platform = espressif32
framework = arduino
monitor_speed = ${extra.baud}
lib_deps = 
	homespan/HomeSpan@2.1.0
	bbx10/DNSServer@^1.1.0
	links2004/WebSockets@^2.4.0
	bblanchon/ArduinoJson@^7.0.0
build_flags = 
	-I include
	-std=c++17
	-DARDUINO_USB_CDC_ON_BOOT=1

[env:esp32-s3-devkitc-1-n16r8v]
board = esp32-s3-devkitc-1
board_build.partitions = partitions_custom.csv
board_build.flash_size = 16MB
build_flags = 
	${env.build_flags}
	-DARDUINO_LOOP_STACK_SIZE=8192
	-DCONFIG_FREERTOS_UNICORE=1
	-DCONFIG_ESP32_WIFI_TASK_STACK_SIZE=4096

[env:esp32-s3-usb]
board = esp32-s3-devkitc-1
board_build.partitions = partitions_custom.csv
board_build.flash_size = 16MB
upload_protocol = esptool
build_flags = 
	${env.build_flags}
	-DARDUINO_LOOP_STACK_SIZE=8192
	-DCONFIG_FREERTOS_UNICORE=1
	-DCONFIG_ESP32_WIFI_TASK_STACK_SIZE=4096
lib_deps = 
	homespan/HomeSpan@2.1.0
	links2004/WebSockets@^2.4.0
	bblanchon/ArduinoJson@^7.0.0

[env:esp32-s3-ota]
board = esp32-s3-devkitc-1
board_build.partitions = partitions_custom.csv
board_build.flash_size = 16MB
upload_protocol = espota
upload_port = 192.168.50.23
upload_flags = --auth=12345678
build_flags = 
	${env.build_flags}
	-DARDUINO_LOOP_STACK_SIZE=8192
	-DCONFIG_FREERTOS_UNICORE=1
	-DCONFIG_ESP32_WIFI_TASK_STACK_SIZE=4096

[env:esp32-c3-supermini-usb]
board = lolin_c3_mini
board_build.flash_mode = dio
board_build.flash_size = 4MB
board_build.partitions = partitions_custom.csv
upload_protocol = esptool
build_flags = 
	${env.build_flags}
	-DESP32C3_SUPER_MINI
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_LOOP_STACK_SIZE=8192
	-DCONFIG_FREERTOS_UNICORE=1
	-DCONFIG_ESP32_WIFI_TASK_STACK_SIZE=4096
	-Os
	-ffunction-sections
	-fdata-sections
	-Wl,--gc-sections
	-DCORE_DEBUG_LEVEL=1

[env:esp32-c3-supermini-production]
board = lolin_c3_mini
board_build.flash_mode = dio
board_build.flash_size = 4MB
board_build.partitions = partitions_custom.csv
upload_protocol = esptool
build_flags = 
	${env.build_flags}
	-DESP32C3_SUPER_MINI
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_LOOP_STACK_SIZE=8192
	-DCONFIG_FREERTOS_UNICORE=1
	-DCONFIG_ESP32_WIFI_TASK_STACK_SIZE=4096
	-Os
	-ffunction-sections
	-fdata-sections
	-Wl,--gc-sections
	-DCORE_DEBUG_LEVEL=1
	-DPRODUCTION_BUILD
	-DDISABLE_SIMULATION_MODE
	-DDISABLE_MOCK_CONTROLLER
lib_deps = 
	links2004/WebSockets@^2.4.0
	bblanchon/ArduinoJson@^7.0.0
	homespan/HomeSpan@2.1.0

